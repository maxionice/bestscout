name: Release Linux

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: npm ci
      - name: Verify tag and release metadata
        run: node scripts/verify-release-metadata.mjs --tag=${{ github.ref_name }}
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: npm run test --workspace @bestscout/desktop
      - name: Build and upload native Linux bundles
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: "1"
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: BestScout ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
      - name: Build offline Flatpak edition
        run: scripts/build-flatpak.sh
      - name: Verify bundles and generate checksums
        run: node scripts/verify-linux-bundles.mjs --write-checksums
      - name: Upload Flatpak and checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}"
          release-artifacts/*.flatpak release-artifacts/SHA256SUMS --clobber
