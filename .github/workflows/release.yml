name: Release Linux

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Require a production-ready commit on main
        run: |
          git fetch --no-tags origin main
          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          git merge-base --is-ancestor "$tag_commit" origin/main
          node scripts/verify-release-readiness.mjs \
            --tag="$GITHUB_REF_NAME" \
            --require-complete
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: npm ci
      - name: Verify tag and release metadata
        run: node scripts/verify-release-metadata.mjs --tag=${{ github.ref_name }}
      - run: node --test scripts/*.test.mjs
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: npm run test --workspace @bestscout/desktop
      - name: Build and upload native Linux bundles
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: "1"
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: BestScout ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: false
      - name: Build offline Flatpak edition
        run: scripts/build-flatpak.sh
      - name: Prepare native Steam Deck edition
        run: node scripts/prepare-steam-deck.mjs
      - name: Verify complete release set and generate checksums
        run: node scripts/verify-linux-bundles.mjs --write-checksums --require-release-set
      - name: Verify generated checksums
        run: cd release-artifacts && sha256sum -c SHA256SUMS
      - name: Generate signed build provenance
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: release-artifacts/SHA256SUMS
      - name: Stage portable Sigstore bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: cp -- "$ATTESTATION_BUNDLE" "release-artifacts/BestScout_${GITHUB_REF_NAME#v}_provenance.sigstore.json"
      - name: Verify signed provenance before publication
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          while read -r _ artifact; do
            gh attestation verify "release-artifacts/$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle "$ATTESTATION_BUNDLE" \
              --signer-workflow "github.com/$GITHUB_REPOSITORY/.github/workflows/release.yml"
          done < release-artifacts/SHA256SUMS
      - name: Upload complete verified release set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_list="$RUNNER_TEMP/bestscout-release-assets"
          node scripts/list-release-assets.mjs \
            --artifact-root release-artifacts \
            --provenance "release-artifacts/BestScout_${GITHUB_REF_NAME#v}_provenance.sigstore.json" \
            --expected-subjects 8 > "$asset_list"
          mapfile -t release_assets < "$asset_list"
          test "${#release_assets[@]}" -eq 10
          gh release upload "$GITHUB_REF_NAME" "${release_assets[@]}" --clobber
      - name: Publish signed release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
